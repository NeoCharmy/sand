name: Download USA Demo from Torrent

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  download-and-split:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Install aria2
      run: sudo apt-get update -q && sudo apt-get install -y -q aria2

    - name: Decode torrent.b64 to binary torrent
      run: base64 -d torrent.b64 > demo.torrent

    - name: Find index of USA demo
      id: find_index
      run: |
        aria2c --show-files demo.torrent > torrent_files.txt
        cat torrent_files.txt
        # Look for the exact filename: "Sonic & All-Stars Racing Transformed (USA) (Demo).zip"
        INDEX=$(grep -F "Sonic & All-Stars Racing Transformed (USA) (Demo).zip" torrent_files.txt | head -1 | awk -F'|' '{print $1}' | tr -d ' |>')
        if [ -z "$INDEX" ]; then
          echo "USA demo file not found!"
          exit 1
        fi
        echo "Index: $INDEX"
        echo "index=$INDEX" >> $GITHUB_OUTPUT

    - name: Download only the USA demo
      run: |
        aria2c --select-file=${{ steps.find_index.outputs.index }} \
               --seed-time=0 --max-connection-per-server=16 --split=16 \
               --dir=download demo.torrent

    - name: Locate downloaded zip
      id: locate
      run: |
        ZIPFILE=$(find download -type f -name "*USA*Demo*.zip" | head -1)
        if [ -z "$ZIPFILE" ]; then
          echo "No USA demo zip found!"
          ls -R download/
          exit 1
        fi
        echo "Found: $ZIPFILE"
        ls -lh "$ZIPFILE"
        echo "zipfile=$ZIPFILE" >> $GITHUB_OUTPUT

    - name: Split zip into 90 MB chunks
      run: |
        ZIPFILE="${{ steps.locate.outputs.zipfile }}"
        split -b 90M "$ZIPFILE" demo-usa.zip.part
        echo "Generated parts:"
        ls -lh demo-usa.zip.part*
        rm "$ZIPFILE"

    - name: Commit parts
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git add demo-usa.zip.part*
        git commit -m "Add USA demo (split parts)" || echo "Nothing to commit"
        git push
