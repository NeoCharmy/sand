name: Generate title.tik using uShop

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate-tik:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout your repository
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install pycryptodome
      run: pip install pycryptodome

    - name: Clone uShop
      run: |
        git clone --depth 1 https://github.com/SashLilac/uShop.git
        cd uShop
        # Verify the main script exists
        test -f ushop.py || (echo "ushop.py not found!" && exit 1)
        cd ..

    - name: Run uShop to generate ticket
      run: |
        # The demo title ID for Sonic & All-Stars Racing Transformed (USA)
        # Demos are free content, so the ticket is publicly available
        cd uShop
        python ushop.py 000500001010b300
        cd ..
        # The generated ticket will be in the uShop directory
        find uShop -name "title.tik" -exec cp {} ./title.tik \;

    - name: Commit the generated title.tik
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git add title.tik
        git commit -m "Add generated title.tik for the demo" || echo "Nothing to commit"
        git push
