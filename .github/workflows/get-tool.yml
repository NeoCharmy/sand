name: Get CDecrypt Windows binary (API)

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Get CDecrypt asset URL
      id: get_url
      run: |
        API_URL="https://api.github.com/repos/VitaSmith/cdecrypt/releases/latest"
        ASSET_URL=$(curl -s -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" $API_URL | jq -r '.assets[] | select(.name | test("win.*\\.zip$")) | .browser_download_url')
        if [ -z "$ASSET_URL" ] || [ "$ASSET_URL" = "null" ]; then
          echo "API failed, falling back to known URL"
          ASSET_URL="https://github.com/VitaSmith/cdecrypt/releases/download/v4.7/cdecrypt-v4.7-win-x64.zip"
        fi
        echo "Using asset URL: $ASSET_URL"
        echo "asset_url=$ASSET_URL" >> $GITHUB_OUTPUT

    - name: Download CDecrypt zip
      run: |
        wget -q -O cdecrypt.zip "${{ steps.get_url.outputs.asset_url }}"

    - name: Extract only the .exe
      run: |
        unzip -j cdecrypt.zip "*.exe" -d .
        rm cdecrypt.zip

    - name: Commit CDecrypt.exe
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git add CDecrypt.exe
        git commit -m "Add CDecrypt Windows binary" || echo "Nothing to commit"
        git push
