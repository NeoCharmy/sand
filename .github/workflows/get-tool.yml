name: Generate title.tik for the USA Demo

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate-tik:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout your repository
      uses: actions/checkout@v4

    - name: Generate title.tik using Python
      run: |
        python3 << 'EOF'
        import struct

        # Title ID for Sonic & All-Stars Racing Transformed (USA) (Demo)
        title_id = "000500001010B300"
        tid_bytes = bytes.fromhex(title_id)

        # Build a standard 848-byte ticket for a free demo (key all zeros)
        ticket = bytearray(848)

        # Signature issuer (Root-CA00000004-XS0000000c)
        sig_issuer = b"Root-CA00000004-XS0000000c\x00"
        ticket[0x000:0x040] = sig_issuer.ljust(0x40, b'\x00')

        # Encrypted title key (all zeros → key is zero)
        ticket[0x1BF:0x1CF] = b'\x00' * 16

        # Title ID at offset 0x1DC (8 bytes)
        ticket[0x1DC:0x1E4] = tid_bytes

        # Ticket ID (can be zero)
        # Leave as zero

        with open("title.tik", "wb") as f:
            f.write(ticket)
        print("title.tik generated successfully")
        EOF

    - name: Commit title.tik
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git add title.tik
        git commit -m "Add generated title.tik for USA demo" || echo "Nothing to commit"
        git push
