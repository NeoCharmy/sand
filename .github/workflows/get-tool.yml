name: Get Demo Content List

on:
  workflow_dispatch:

jobs:
  get-list:
    runs-on: ubuntu-latest
    steps:
    - name: Fetch content IDs from title key database
      run: |
        # Use titlekeys.ovh API
        echo "Trying API..."
        curl -s "https://api.titlekeys.ovh/v1/title/000500001010B300" > api.json
        if grep -q '"content"' api.json; then
          python3 -c "
import json, sys
data = json.load(open('api.json'))
content = data.get('content', [])
if content:
    for c in content:
        print(f'{c[\"id\"]:08x}.app')
else:
    print('No content found')
"
        else
          echo "API failed. Trying alternative database..."
          # Fallback: use wiiu.titlekeys.gq (text format)
          curl -s "https://wiiu.titlekeys.gq/" > page.html
          # Parse the table row for 000500001010B300 (this is rough, might need manual extraction)
          grep "000500001010B300" page.html
        fi
