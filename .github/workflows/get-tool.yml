name: Generate title.tik and title.cert

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Create title.tik and title.cert using Python
      run: |
        python3 -c '
import struct
from Crypto.Cipher import AES

TITLE_ID = bytes.fromhex("000500001010B300")
COMMON_KEY = bytes.fromhex("D7B00402659BA2ABD2CB0DB27FA2B656")
TITLE_KEY = bytes(16)

# ----- Generate title.tik -----
iv_title = TITLE_ID.ljust(16, b"\x00")
cipher_enc = AES.new(COMMON_KEY, AES.MODE_CBC, iv_title)
encrypted_title_key = cipher_enc.encrypt(TITLE_KEY)

ticket = bytearray(848)
issuer = b"Root-CA00000003-XS0000000c\x00"
ticket[0x000:0x040] = issuer.ljust(0x40, b"\x00")
struct.pack_into(">H", ticket, 0x1A0, 1)
ticket[0x1B1] = 0
ticket[0x1BF:0x1CF] = encrypted_title_key
ticket[0x1DC:0x1E4] = TITLE_ID

with open("title.tik", "wb") as f:
    f.write(ticket)
print("title.tik created")

# ----- Generate minimal title.cert -----
cert = bytearray(0x300)
cert_issuer = b"Root-CA00000003-XS0000000c\x00"
cert[0x000:0x040] = cert_issuer.ljust(0x40, b"\x00")
struct.pack_into(">I", cert, 0x040, 0x00010001)
with open("title.cert", "wb") as f:
    f.write(cert)
print("title.cert created")
'

    - name: Commit files
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git add title.tik title.cert
        git commit -m "Add generated title.tik and title.cert" || echo "Nothing to commit"
        git push
