name: Download Complete Demo via FunKiiU

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  download:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Clone and setup FunKiiU
      run: |
        git clone --depth 1 https://github.com/weidaidai/FunKiiU.git
        cd FunKiiU
        # No pip install needed, the script runs directly
        cd ..

    - name: Run FunKiiU to download the USA demo
      run: |
        cd FunKiiU
        # The title ID for the USA demo can be used here
        python FunKiiU.py -title 00050000101C0000 -key <title key>
        cd ..

    - name: Package downloaded files
      run: |
        zip -r demo-complete.zip FunKiiU/
        split -b 90M demo-complete.zip demo-complete.zip.part
        rm demo-complete.zip

    - name: Commit the split parts
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git add demo-complete.zip.part*
        git commit -m "Add complete Wii U demo (with ticket)" || echo "Nothing to commit"
        git push
