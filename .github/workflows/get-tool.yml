name: Get CDecrypt Release Zip

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Download CDecrypt release zip
      run: |
        wget -q -O cdecrypt.zip "https://github.com/VitaSmith/cdecrypt/releases/download/v4.8/cdecrypt.zip"

    - name: Commit cdecrypt.zip
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git add cdecrypt.zip
        git commit -m "Add CDecrypt release zip" || echo "Nothing to commit"
        git push
