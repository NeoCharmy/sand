name: Generate title.tik for the demo

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate-tik:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout your repository
      uses: actions/checkout@v4

    - name: Setup Java (required by uShop)
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Clone and run uShop
      run: |
        git clone --depth 1 https://github.com/MillaBasset/uShop.git
        cd uShop
        # Copy your CDN files into the input directory expected by uShop
        mkdir -p input
        cp ../*.app ../*.h3 ../*.tmd ../*.cert input/ 2>/dev/null || true
        cp ../tmd.0 input/title.tmd 2>/dev/null || true
        # Run uShop to generate the ticket
        java -jar uShop.jar -ticket input
        # The generated title.tik will now be in the input folder
        cp input/title.tik ../title.tik 2>/dev/null || true
        cd ..

    - name: Commit the generated title.tik
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git add title.tik
        git commit -m "Add generated title.tik for demo" || echo "Nothing to commit"
        git push
