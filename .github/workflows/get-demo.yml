name: Download and Split Sonic Racing Transformed Demo (single file only)

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  download-and-split:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Install aria2
      run: sudo apt-get update -q && sudo apt-get install -y -q aria2

    - name: Download .torrent file
      run: |
        wget -q -O demo.torrent "https://dl.sonichotspot.ir/eggmanland/original.torrent"

    - name: Find the index of the demo zip inside the torrent
      id: find_index
      run: |
        # List all files in the torrent
        FILE_LIST=$(aria2c --show-files demo.torrent 2>&1)
        echo "$FILE_LIST"
        # Look for the line containing the exact demo zip name
        # Example output lines:
        #   |> 1| |4.3GiB| |.../Sonic & All-Stars Racing Transformed (Europe) (Demo).zip
        INDEX=$(echo "$FILE_LIST" | grep -i "Sonic & All-Stars Racing Transformed (Europe) (Demo).zip" | head -1 | awk -F'|' '{print $1}' | tr -d ' |>')
        if [ -z "$INDEX" ]; then
          echo "Could not find the demo file in torrent!"
          exit 1
        fi
        echo "Found demo file at index: $INDEX"
        echo "index=$INDEX" >> $GITHUB_OUTPUT

    - name: Download only the selected file from the torrent
      run: |
        aria2c --select-file=${{ steps.find_index.outputs.index }} \
               --seed-time=0 --max-connection-per-server=16 --split=16 \
               --dir=download demo.torrent

    - name: Locate the downloaded zip
      id: locate
      run: |
        ZIPFILE=$(find download -type f -name "*.zip" | head -1)
        if [ -z "$ZIPFILE" ]; then
          echo "No zip file found!"
          exit 1
        fi
        echo "Found: $ZIPFILE"
        echo "zipfile=$ZIPFILE" >> $GITHUB_OUTPUT

    - name: Split zip into 90 MB chunks
      run: |
        ZIPFILE="${{ steps.locate.outputs.zipfile }}"
        split -b 90M "$ZIPFILE" demo.zip.part
        rm "$ZIPFILE"

    - name: Commit all parts
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git add demo.zip.part*
        git commit -m "Add Sonic Racing Transformed demo (split parts)" || echo "Nothing to commit"
        git push
