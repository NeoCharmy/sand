name: Download Demo from Embedded Torrent (Fixed Find)

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  download-and-split:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Install aria2
      run: sudo apt-get update -q && sudo apt-get install -y -q aria2

    - name: Decode torrent.b64 to binary torrent
      run: |
        base64 -d torrent.b64 > demo.torrent
        rm torrent.b64

    - name: Find the index of the demo zip inside the torrent
      id: find_index
      run: |
        FILE_LIST=$(aria2c --show-files demo.torrent 2>&1)
        echo "$FILE_LIST"
        INDEX=$(echo "$FILE_LIST" | grep -i "Sonic & All-Stars Racing Transformed (Europe) (Demo).zip" | head -1 | awk -F'|' '{print $1}' | tr -d ' |>')
        if [ -z "$INDEX" ]; then
          echo "Could not find the demo file in torrent!"
          exit 1
        fi
        echo "Found demo file at index: $INDEX"
        echo "index=$INDEX" >> $GITHUB_OUTPUT

    - name: Download only the selected file from the torrent
      run: |
        aria2c --select-file=${{ steps.find_index.outputs.index }} \
               --seed-time=0 --max-connection-per-server=16 --split=16 \
               --dir=download demo.torrent

    - name: Locate the downloaded DEMO zip (not the update)
      id: locate
      run: |
        # Search specifically for the file containing "(Demo)" to avoid the update zip
        ZIPFILE=$(find download -type f -name "*Demo*.zip" | head -1)
        if [ -z "$ZIPFILE" ]; then
          echo "No demo zip found!"
          ls -R download/
          exit 1
        fi
        echo "Found demo: $ZIPFILE"
        ls -lh "$ZIPFILE"
        echo "zipfile=$ZIPFILE" >> $GITHUB_OUTPUT

    - name: Split zip into 90 MB chunks
      run: |
        ZIPFILE="${{ steps.locate.outputs.zipfile }}"
        split -b 90M "$ZIPFILE" demo.zip.part
        echo "Generated parts:"
        ls -lh demo.zip.part*
        rm "$ZIPFILE"

    - name: Commit all parts
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git add demo.zip.part*
        git commit -m "Add Sonic Racing Transformed demo (split parts)" || echo "Nothing to commit"
        git push
