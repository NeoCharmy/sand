name: Split main.dol with ppcdis

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  split:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Download ppcdis (v0.4.3)
      run: |
        wget -nv -O ppcdis.zip https://github.com/SeekyCt/ppcdis/releases/download/v0.4.3/ppcdis-linux-x86_64.zip
        unzip ppcdis.zip
        chmod +x ppcdis

    - name: Run ppcdis split
      run: |
        ./ppcdis split main.dol --out src

    - name: Clean up ppcdis
      run: rm -f ppcdis ppcdis.zip

    - name: Commit generated project files
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git add src/
        git commit -m "Initial split of main.dol with ppcdis" || echo "Nothing to commit"
        git push
