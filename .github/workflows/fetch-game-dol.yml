name: Split main.dol with ppcdis (Python)

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  split:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout your repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Clone and install ppcdis
      run: |
        git clone --depth 1 https://github.com/SeekyCt/ppcdis.git
        cd ppcdis
        pip install -e .
        cd ..

    - name: Verify ppcdis is installed
      run: python -m ppcdis --help

    - name: Run ppcdis split (using python module)
      run: |
        python -m ppcdis split main.dol --out src

    - name: Commit generated project
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git add src/
        git commit -m "Initial split of main.dol with ppcdis" || echo "Nothing to commit"
        git push
