name: Split main.dol with ppcdis (build from source)

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  split:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout your repository
      uses: actions/checkout@v4

    - name: Install Rust (if not already present)
      run: rustup update stable

    - name: Clone and build ppcdis
      run: |
        git clone --depth 1 https://github.com/SeekyCt/ppcdis.git
        cd ppcdis
        cargo build --release
        cp target/release/ppcdis ../
        cd ..
        rm -rf ppcdis

    - name: Run ppcdis split
      run: ./ppcdis split main.dol --out src

    - name: Clean up
      run: rm ./ppcdis

    - name: Commit generated project files
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git add src/
        git commit -m "Initial split of main.dol with ppcdis (built from source)" || echo "Nothing to commit"
        git push
