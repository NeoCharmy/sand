name: Split main.dol with ppcdis

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  split:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Get ppcdis latest release download URL
      id: get_url
      run: |
        # Fetch the latest release info from the GitHub API
        API_URL="https://api.github.com/repos/SeekyCt/ppcdis/releases/latest"
        ASSET_URL=$(curl -s $API_URL | jq -r '.assets[] | select(.name | test("linux-x86_64.*\\.zip$")) | .browser_download_url')
        if [ -z "$ASSET_URL" ]; then
          echo "Failed to find the Linux zip asset"
          exit 1
        fi
        echo "asset_url=$ASSET_URL" >> $GITHUB_OUTPUT

    - name: Download ppcdis
      run: |
        wget -nv -O ppcdis.zip "${{ steps.get_url.outputs.asset_url }}"
        unzip ppcdis.zip
        chmod +x ppcdis

    - name: Run ppcdis split
      run: |
        ./ppcdis split main.dol --out src

    - name: Clean up ppcdis
      run: rm -f ppcdis ppcdis.zip

    - name: Commit generated project files
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git add src/
        git commit -m "Initial split of main.dol with ppcdis" || echo "Nothing to commit"
        git push
