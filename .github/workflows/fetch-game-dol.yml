name: Decode main.dol from base64

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  decode:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Decode base64 to binary
      run: |
        base64 -d main.dol.b64 > main.dol
        rm main.dol.b64

    - name: Commit main.dol
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git add main.dol
        git commit -m "Add game executable (decoded from base64)" || echo "Nothing to commit"
        git push
