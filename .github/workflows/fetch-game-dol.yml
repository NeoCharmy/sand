name: Recomp Wii Menu

on:
  push:
    paths:
      - 'main.dol'
      - '.github/workflows/recomp.yml'
  workflow_dispatch:

jobs:
  recomp:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Python dependencies
        run: |
          pip install sortedcontainers

      - name: Clone ppcdis
        run: |
          git clone https://github.com/SeekyCt/ppcdis.git
          cd ppcdis
          git submodule update --init --recursive

      - name: Run ppcdis analysis
        run: |
          cd ppcdis
          # Use the Python module directly - no CMake build needed
          python -m ppcdis.disassembler --dol ../main.dol --output ../recomp_output
        
      - name: Extract menu related files
        run: |
          mkdir menu_isolated
          grep -l -i "menu\|option\|start\|select\|press start" recomp_output/*.cpp > menu_files.txt 2>/dev/null || true
          if [ -s menu_files.txt ]; then
            while IFS= read -r file; do
              cp "$file" menu_isolated/
            done < menu_files.txt
            cp recomp_output/*.h menu_isolated/ 2>/dev/null || true
          fi

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: menu_recomp_output
          path: |
            menu_isolated/
            recomp_output/
