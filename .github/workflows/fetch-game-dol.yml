name: Split main.dol with ppcdis (final)

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  split:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout your repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Clone and install ppcdis
      run: |
        git clone --depth 1 https://github.com/SeekyCt/ppcdis.git
        cd ppcdis
        pip install -e .
        cd ..

    - name: Find ppcdis entry point and run split
      run: |
        # The entry point is likely ppcdis/cli.py or ppcdis/__init__.py
        # We'll try common patterns and pick the first one that works.
        if [ -f "ppcdis/cli.py" ]; then
          python -m ppcdis.cli split main.dol --out src
        elif [ -f "ppcdis/__init__.py" ]; then
          # Check if there is a function called main in __init__.py
          python -c "import ppcdis; ppcdis.main()" 2>/dev/null && python -c "import ppcdis; ppcdis.main()" -- split main.dol --out src
        else
          echo "Could not find entry point, listing ppcdis directory:"
          ls ppcdis/
          exit 1
        fi

    - name: Commit generated project
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git add src/
        git commit -m "Initial split of main.dol with ppcdis" || echo "Nothing to commit"
        git push
