name: Split main.dol with ppcdis (final)

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  split:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout your repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Clone and install ppcdis
      run: |
        git clone --depth 1 https://github.com/SeekyCt/ppcdis.git
        cd ppcdis
        pip install -e .
        cd ..

    - name: Run the ppcdis script directly
      run: |
        # The setup.py entry point installs a script called 'ppcdis' in the local bin
        # We'll use the full path to be safe
        python ppcdis/setup.py develop 2>/dev/null || true
        # Alternatively, just use the CLI directly as defined in pyproject.toml
        python ./ppcdis/makesrc.py split main.dol --out src

    - name: Commit generated project
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git add src/
        git commit -m "Initial split of main.dol with ppcdis" || echo "Nothing to commit"
        git push
