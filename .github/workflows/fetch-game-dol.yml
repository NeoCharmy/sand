name: Download Game Executable from My Host

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Download the .dol file
      run: |
        wget -nv -O main.dol "https://dl.sonichotspot.ir/eggmanland/ssasr/boot.dol"
        # If your file has a different name, change the URL above
        # Example: if it's named game.dol, use:
        # wget -nv -O main.dol "https://dl.sonichotspot.ir/eggmanland/ssasr/game.dol"

    - name: Commit main.dol
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git add main.dol
        git commit -m "Add Sonic & Sega All-Stars Racing executable" || echo "No changes to commit"
        git push
